<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D Model Viewer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(ellipse at center, #1a1a2e 0%, #0f0f1a 70%, #000 100%);
      overflow: hidden;
    }
    canvas {
      display: block;
      cursor: grab;
    }
    canvas:active { cursor: grabbing; }
    canvas.dragging { cursor: grabbing; }
    .info {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.3);
      font: 14px sans-serif;
      pointer-events: none;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="info">Drag to rotate · Scroll to zoom</div>
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>
  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { OBJLoader } from 'three/addons/loaders/OBJLoader.js';

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x111122);

    const camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 1.5, 7);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.0;
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.autoRotate = false;
    controls.enableZoom = true;
    controls.zoomSpeed = 0.8;
    controls.rotateSpeed = 0.8;
    controls.target.set(0, 0, 0);
    controls.minDistance = 2;
    controls.maxDistance = 15;

    const canvas = renderer.domElement;

    let velocityX = 0;
    let velocityY = 0;
    let isDragging = false;
    let prevX = 0;
    let prevY = 0;

    canvas.addEventListener('pointerdown', (e) => {
      isDragging = true;
      controls.autoRotate = false;
      velocityX = 0;
      velocityY = 0;
      prevX = e.clientX;
      prevY = e.clientY;
      canvas.classList.add('dragging');
    });

    canvas.addEventListener('pointermove', (e) => {
      if (!isDragging) return;
      const dx = e.clientX - prevX;
      const dy = e.clientY - prevY;
      velocityX = dx * 0.004;
      velocityY = dy * 0.004;
      prevX = e.clientX;
      prevY = e.clientY;
    });

    canvas.addEventListener('pointerup', () => {
      isDragging = false;
      canvas.classList.remove('dragging');
    });

    canvas.addEventListener('pointerleave', () => {
      isDragging = false;
      canvas.classList.remove('dragging');
    });

    const hemiLight = new THREE.HemisphereLight(0x8d7df7, 0x1a1a2e, 1.2);
    scene.add(hemiLight);

    const keyLight = new THREE.DirectionalLight(0xffeedd, 3.0);
    keyLight.position.set(4, 6, 5);
    keyLight.castShadow = true;
    keyLight.shadow.mapSize.width = 1024;
    keyLight.shadow.mapSize.height = 1024;
    keyLight.shadow.camera.near = 0.1;
    keyLight.shadow.camera.far = 20;
    keyLight.shadow.camera.left = -5;
    keyLight.shadow.camera.right = 5;
    keyLight.shadow.camera.top = 5;
    keyLight.shadow.camera.bottom = -5;
    scene.add(keyLight);

    const fillLight = new THREE.DirectionalLight(0x8888ff, 1.0);
    fillLight.position.set(-3, 1, 2);
    scene.add(fillLight);

    const rimLight = new THREE.DirectionalLight(0xffffff, 0.8);
    rimLight.position.set(-1, -2, -5);
    scene.add(rimLight);

    const ground = new THREE.Mesh(
      new THREE.PlaneGeometry(10, 10),
      new THREE.ShadowMaterial({ opacity: 0.4, color: 0x000000 })
    );
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = -0.8;
    ground.receiveShadow = true;
    scene.add(ground);

    const texLoader = new THREE.TextureLoader();

    const envMap = texLoader.load('https://threejs.org/examples/textures/planets/earth_atmos_2048.jpg');
    envMap.mapping = THREE.EquirectangularReflectionMapping;

    const objLoader = new OBJLoader();
    objLoader.load('3dd362e8-ae0b-4b2d-bc6e-c190c558de20/pack/obj/base.obj', (object) => {
      object.traverse((child) => {
        if (child.isMesh) {
          child.castShadow = true;
          child.material = new THREE.MeshPhysicalMaterial({
            map: texLoader.load('3dd362e8-ae0b-4b2d-bc6e-c190c558de20/pack/textureBasicPack/texture_diffuse.png'),
            normalMap: texLoader.load('3dd362e8-ae0b-4b2d-bc6e-c190c558de20/pack/textureBasicPack/texture_normal.png'),
            metalnessMap: texLoader.load('3dd362e8-ae0b-4b2d-bc6e-c190c558de20/pack/textureBasicPack/texture_metallic.png'),
            roughnessMap: texLoader.load('3dd362e8-ae0b-4b2d-bc6e-c190c558de20/pack/textureBasicPack/texture_roughness.png'),
            metalness: 1,
            roughness: 1,
            clearcoat: 0.05,
            envMapIntensity: 0.6,
          });
        }
      });
      const box = new THREE.Box3().setFromObject(object);
      const size = box.getSize(new THREE.Vector3());
      const maxDim = Math.max(size.x, size.y, size.z);
      const scale = 2 / maxDim;
      object.scale.set(scale, scale, scale);
      object.position.y = 0;
      scene.add(object);
    });

    function animate() {
      requestAnimationFrame(animate);

      if (!isDragging && (Math.abs(velocityX) > 0.0001 || Math.abs(velocityY) > 0.0001)) {
        const pivot = new THREE.Vector3(0, 0, 0);
        const offset = camera.position.clone().sub(pivot);
        const radius = offset.length();

        const theta = Math.atan2(offset.x, offset.z);
        const phi = Math.atan2(offset.y, Math.sqrt(offset.x * offset.x + offset.z * offset.z));

        const newTheta = theta - velocityX;
        const newPhi = Math.max(-Math.PI / 2 + 0.1, Math.min(Math.PI / 2 - 0.1, phi + velocityY));

        camera.position.x = radius * Math.sin(newTheta) * Math.cos(newPhi);
        camera.position.y = radius * Math.sin(newPhi);
        camera.position.z = radius * Math.cos(newTheta) * Math.cos(newPhi);
        camera.lookAt(pivot);

        velocityX *= 0.97;
        velocityY *= 0.97;
      } else if (!isDragging) {
        controls.update();
      } else {
        controls.update();
      }

      renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
