<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flying Game</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #000; font-family: Arial, sans-serif; }
    canvas { display: block; }
    #ui {
      position: fixed; top: 0; left: 0; width: 100%;
      padding: 20px; pointer-events: none;
      display: flex; justify-content: space-between;
    }
    #score, #height {
      color: #fff; font-size: 22px; font-weight: bold;
      text-shadow: 0 2px 10px rgba(0,0,0,0.8);
    }
    #controls {
      position: fixed; bottom: 30px; left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.4);
      font-size: 14px; text-align: center;
      pointer-events: none;
      text-shadow: 0 2px 8px rgba(0,0,0,0.8);
    }
    #controls kbd {
      background: rgba(255,255,255,0.1);
      padding: 2px 8px; border-radius: 4px;
      border: 1px solid rgba(255,255,255,0.2);
    }
  </style>
</head>
<body>
  <div id="ui">
    <div id="score">⭐ 0</div>
    <div id="height">⬆ 0m</div>
  </div>
  <div id="controls">
    <kbd>W</kbd> <kbd>A</kbd> <kbd>S</kbd> <kbd>D</kbd> Fly · <kbd>Space</kbd> Up · <kbd>Shift</kbd> Down
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>
  <script type="module">
    import * as THREE from 'three';
    import { OBJLoader } from 'three/addons/loaders/OBJLoader.js';

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1a1a3e);
    scene.fog = new THREE.Fog(0x1a1a3e, 50, 150);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 500);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.0;
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.body.appendChild(renderer.domElement);

    const texLoader = new THREE.TextureLoader();

    const player = new THREE.Object3D();
    player.position.set(0, 5, 0);

    let modelObj = null;
    const objLoader = new OBJLoader();
    objLoader.load('../3D/2/3dd362e8-ae0b-4b2d-bc6e-c190c558de20/pack/obj/base.obj', (object) => {
      object.traverse((child) => {
        if (child.isMesh) {
          child.castShadow = true;
          child.material = new THREE.MeshPhysicalMaterial({
            map: texLoader.load('../3D/2/3dd362e8-ae0b-4b2d-bc6e-c190c558de20/pack/textureBasicPack/texture_diffuse.png'),
            normalMap: texLoader.load('../3D/2/3dd362e8-ae0b-4b2d-bc6e-c190c558de20/pack/textureBasicPack/texture_normal.png'),
            metalnessMap: texLoader.load('../3D/2/3dd362e8-ae0b-4b2d-bc6e-c190c558de20/pack/textureBasicPack/texture_metallic.png'),
            roughnessMap: texLoader.load('../3D/2/3dd362e8-ae0b-4b2d-bc6e-c190c558de20/pack/textureBasicPack/texture_roughness.png'),
            metalness: 1, roughness: 1, envMapIntensity: 0.5,
          });
        }
      });
      const box = new THREE.Box3().setFromObject(object);
      const size = box.getSize(new THREE.Vector3());
      const maxDim = Math.max(size.x, size.y, size.z);
      const scale = 1.5 / maxDim;
      object.scale.set(scale, scale, scale);
      object.position.y = 0;
      modelObj = object;
      player.add(object);
    });
    scene.add(player);

    const hemiLight = new THREE.HemisphereLight(0x8d7df7, 0x1a1a2e, 1.0);
    scene.add(hemiLight);

    const sunLight = new THREE.DirectionalLight(0xffeedd, 2.5);
    sunLight.position.set(30, 40, 20);
    sunLight.castShadow = true;
    sunLight.shadow.mapSize.width = 2048;
    sunLight.shadow.mapSize.height = 2048;
    sunLight.shadow.camera.near = 0.1;
    sunLight.shadow.camera.far = 100;
    sunLight.shadow.camera.left = -50;
    sunLight.shadow.camera.right = 50;
    sunLight.shadow.camera.top = 50;
    sunLight.shadow.camera.bottom = -50;
    scene.add(sunLight);

    const ambLight = new THREE.AmbientLight(0x404070, 0.3);
    scene.add(ambLight);

    function createGround() {
      const grid = new THREE.Group();
      const groundMat = new THREE.MeshStandardMaterial({
        color: 0x1a1a3e, roughness: 0.9, metalness: 0.0,
      });
      const ground = new THREE.Mesh(new THREE.PlaneGeometry(200, 200), groundMat);
      ground.rotation.x = -Math.PI / 2;
      ground.position.y = -0.5;
      ground.receiveShadow = true;
      grid.add(ground);

      const gridHelper = new THREE.GridHelper(200, 40, 0x4444aa, 0x333388);
      gridHelper.position.y = -0.4;
      grid.add(gridHelper);
      return grid;
    }
    scene.add(createGround());

    const coins = [];
    function spawnCoins() {
      const coinGeo = new THREE.TorusGeometry(0.4, 0.15, 8, 16);
      const coinMat = new THREE.MeshPhysicalMaterial({
        color: 0xffdd44, metalness: 1, roughness: 0.2,
        emissive: 0xffaa00, emissiveIntensity: 0.3,
      });
      for (let i = 0; i < 40; i++) {
        const coin = new THREE.Mesh(coinGeo, coinMat);
        const angle = Math.random() * Math.PI * 2;
        const dist = 10 + Math.random() * 60;
        coin.position.set(
          Math.cos(angle) * dist,
          2 + Math.random() * 20,
          Math.sin(angle) * dist
        );
        coin.rotation.x = Math.PI / 2;
        coin.userData = { collected: false, floatOffset: Math.random() * Math.PI * 2 };
        scene.add(coin);
        coins.push(coin);
      }
    }
    spawnCoins();

    const obstacles = [];
    function spawnObstacles() {
      const obsMat = new THREE.MeshPhysicalMaterial({
        color: 0xcc3344, metalness: 0.3, roughness: 0.6,
        emissive: 0x882222, emissiveIntensity: 0.1,
      });
      for (let i = 0; i < 25; i++) {
        const obs = new THREE.Mesh(new THREE.BoxGeometry(1, 1 + Math.random() * 3, 1), obsMat);
        const angle = Math.random() * Math.PI * 2;
        const dist = 15 + Math.random() * 50;
        obs.position.set(
          Math.cos(angle) * dist,
          1 + Math.random() * 15,
          Math.sin(angle) * dist
        );
        obs.castShadow = true;
        obs.userData = { rotSpeed: 0.5 + Math.random() * 2 };
        scene.add(obs);
        obstacles.push(obs);
      }
    }
    spawnObstacles();

    const particles = [];
    function createParticles() {
      const count = 500;
      const positions = new Float32Array(count * 3);
      for (let i = 0; i < count * 3; i++) {
        positions[i] = (Math.random() - 0.5) * 200;
        if (i % 3 === 1) positions[i] = Math.random() * 40 + 2;
      }
      const geo = new THREE.BufferGeometry();
      geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
      const mat = new THREE.PointsMaterial({
        color: 0x8888ff, size: 0.15, transparent: true, opacity: 0.6,
      });
      const points = new THREE.Points(geo, mat);
      scene.add(points);
      particles.push(points);
    }
    createParticles();

    const keys = { w: false, a: false, s: false, d: false, space: false, shift: false };
    document.addEventListener('keydown', (e) => {
      switch (e.code) {
        case 'KeyW': keys.w = true; e.preventDefault(); break;
        case 'KeyA': keys.a = true; e.preventDefault(); break;
        case 'KeyS': keys.s = true; e.preventDefault(); break;
        case 'KeyD': keys.d = true; e.preventDefault(); break;
        case 'Space': keys.space = true; e.preventDefault(); break;
        case 'ShiftLeft': case 'ShiftRight': keys.shift = true; e.preventDefault(); break;
      }
    });
    document.addEventListener('keyup', (e) => {
      switch (e.code) {
        case 'KeyW': keys.w = false; e.preventDefault(); break;
        case 'KeyA': keys.a = false; e.preventDefault(); break;
        case 'KeyS': keys.s = false; e.preventDefault(); break;
        case 'KeyD': keys.d = false; e.preventDefault(); break;
        case 'Space': keys.space = false; e.preventDefault(); break;
        case 'ShiftLeft': case 'ShiftRight': keys.shift = false; e.preventDefault(); break;
      }
    });

    const speed = 12;
    const upSpeed = 10;
    const rotationSpeed = 2.5;

    let score = 0;
    const scoreEl = document.getElementById('score');
    const heightEl = document.getElementById('height');

    function animate() {
      requestAnimationFrame(animate);

      const forward = new THREE.Vector3(0, 0, -1).applyQuaternion(player.quaternion);
      const right = new THREE.Vector3(1, 0, 0).applyQuaternion(player.quaternion);

      if (keys.w) player.position.add(forward.multiplyScalar(speed * 0.016));
      if (keys.s) player.position.add(forward.clone().multiplyScalar(-speed * 0.016));
      if (keys.a) player.position.add(right.clone().multiplyScalar(-speed * 0.016));
      if (keys.d) player.position.add(right.clone().multiplyScalar(speed * 0.016));
      if (keys.space) player.position.y += upSpeed * 0.016;
      if (keys.shift) player.position.y -= upSpeed * 0.016;

      if (player.position.y < 0) player.position.y = 0;

      if (keys.a && !keys.d) {
        player.rotation.y += rotationSpeed * 0.016;
      } else if (keys.d && !keys.a) {
        player.rotation.y -= rotationSpeed * 0.016;
      }

      if (keys.w) {
        player.rotation.x += -0.3 * 0.016;
      } else if (keys.s) {
        player.rotation.x += 0.3 * 0.016;
      } else {
        player.rotation.x *= 0.95;
      }
      player.rotation.x = Math.max(-0.3, Math.min(0.3, player.rotation.x));

      const camOffset = new THREE.Vector3(0, 3, 8).applyQuaternion(player.quaternion);
      const targetPos = player.position.clone().add(camOffset);
      camera.position.lerp(targetPos, 0.05);
      camera.lookAt(player.position.x, player.position.y + 1, player.position.z);

      coins.forEach((coin) => {
        if (coin.userData.collected) return;
        const dy = Math.sin(Date.now() * 0.003 + coin.userData.floatOffset) * 0.3;
        coin.position.y += dy * 0.016 * 30;
        coin.rotation.z += 0.05;

        const dist = player.position.distanceTo(coin.position);
        if (dist < 1.5) {
          coin.userData.collected = true;
          coin.visible = false;
          score += 10;
          scoreEl.textContent = `⭐ ${score}`;
        }
      });

      obstacles.forEach((obs) => {
        obs.rotation.x += obs.userData.rotSpeed * 0.01;
        obs.rotation.z += obs.userData.rotSpeed * 0.015;
        const dist = player.position.distanceTo(obs.position);
        if (dist < 1.5 && !obs.userData.hit) {
          obs.userData.hit = true;
          score = Math.max(0, score - 5);
          scoreEl.textContent = `⭐ ${score}`;
          obs.material.color.setHex(0xff0000);
          obs.material.emissive.setHex(0xff0000);
          setTimeout(() => {
            obs.material.color.setHex(0xcc3344);
            obs.material.emissive.setHex(0x882222);
            obs.userData.hit = false;
          }, 500);
        }
      });

      heightEl.textContent = `⬆ ${Math.round(player.position.y)}m`;

      renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
